name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    # TELL GITHUB ACTIONS WHERE YOUR NODE APP LIVES
    defaults:
      run:
        working-directory: ./jainism/pooja

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './jainism/pooja/package-lock.json' # Point cache to the right folder

    - name: 📦 Install dependencies
      run: npm ci 

    - name: 🌐 Install Playwright Browsers & OS Dependencies
      run: npx playwright install --with-deps

    - name: 🧪 Run Test Suite (Ajv, Jest, Playwright)
      run: npm test

    - name: Upload Playwright Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-results
        path: jainism/pooja/test-results/
        retention-days: 30