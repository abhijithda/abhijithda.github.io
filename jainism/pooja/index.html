<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jaina Pooja FAQ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <input type="text" id="search-bar" placeholder="Search topics (e.g., ಅಭಿಷೇಕ)..." onkeyup="filterChat()">
        <select id="lang-select" onchange="renderChat()">
            <option value="all">All</option>
            <option value="kn">ಕನ್ನಡ</option>
            <option value="en">English</option>
        </select>
        <div class="display-options" style="display: flex; gap: 15px; align-items: center; font-size: 0.9em;">
            <strong>Show:</strong>
            <label>
                <input type="checkbox" id="toggle-videos" checked onchange="updateMediaVisibility()">
                🎬 Videos
            </label>
            <label>
                <input type="checkbox" id="toggle-qrs" onchange="updateMediaVisibility()">
                📱 QR Codes
            </label>
        </div>
    </header>

    <div id="chat-container"></div>

    <script src="script.js"></script>
</body>

</html>
